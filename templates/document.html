<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ document.title }} - {{ agency_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f8fb; color: #333; }
        .header {
            background: #fff; padding: 16px 32px; border-bottom: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 17px; font-weight: 700; color: #1a1a2e; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .back-btn {
            color: #666; text-decoration: none; font-size: 13px;
            padding: 8px 16px; border-radius: 8px; border: 1px solid #e0e0e0;
            transition: all 0.15s;
        }
        .back-btn:hover { border-color: #999; color: #333; }
        .dl-btn {
            color: #fff; text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 8px 16px; border-radius: 8px; background: #1a1a2e;
            transition: all 0.15s;
        }
        .dl-btn:hover { background: #2a2a4e; }
        .document-container {
            max-width: 760px; margin: 28px auto; background: #fff;
            border-radius: 10px; padding: 44px; border: 1px solid #eee;
        }
        .doc-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
        .doc-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
        .doc-meta { color: #999; font-size: 13px; margin-top: 6px; }
        .doc-content { line-height: 1.8; font-size: 15px; color: #444; }
        .doc-content h1, .doc-content h2, .doc-content h3 { color: #1a1a2e; margin: 28px 0 12px; }
        .doc-content h1 { font-size: 22px; }
        .doc-content h2 { font-size: 18px; }
        .doc-content h3 { font-size: 16px; }
        .doc-content p { margin: 10px 0; }
        .doc-content ul, .doc-content ol { padding-left: 24px; margin: 10px 0; }
        .doc-content li { margin: 6px 0; }
        .doc-content strong { color: #333; }
        .doc-content hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
        @media (max-width: 768px) {
            .document-container { margin: 16px; padding: 24px; }
            .header { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ agency_name }}</h1>
        <div class="header-right">
            <a href="/a/{{ slug }}/dashboard/{{ onboarding_id }}/document/{{ document.type }}/pdf" class="dl-btn">Download PDF</a>
            <a href="/a/{{ slug }}/dashboard/{{ onboarding_id }}/documents" class="back-btn">Back to Documents</a>
        </div>
    </div>

    <div class="document-container">
        <div class="doc-header">
            <div class="doc-title">{{ document.title }}</div>
            <div class="doc-meta">Prepared for {{ data.full_name }} | {{ data.start_date }}</div>
        </div>
        <div class="doc-content">
            {{ document.content_html | safe }}
        </div>
    </div>
</body>
</html>
