<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern-ui.css') }}">
    <style>
        body { background: #0a0a0f; color: #fff; overflow-x: hidden; }

        .auth-bg {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .glow-spot { position: absolute; border-radius: 50%; filter: blur(100px); }
        .glow-spot.one { width: 400px; height: 400px; background: rgba(102,126,234,0.15); top: 10%; left: 5%; }
        .glow-spot.two { width: 350px; height: 350px; background: rgba(118,75,162,0.12); bottom: 10%; right: 10%; }

        .auth-card {
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
            margin: 20px;
        }

        .auth-card h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .auth-card .sub {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-card .form-group label {
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 12px;
        }

        .auth-card .modern-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
        }

        .auth-card .modern-input::placeholder { color: rgba(255,255,255,0.25); }

        .auth-card .modern-input:focus {
            border-color: rgba(102,126,234,0.6);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15), 0 0 20px rgba(102,126,234,0.1);
        }

        .alert-error {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: rgba(255,255,255,0.35);
        }
        .auth-footer a { color: #667eea; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { color: #8b9cf7; }

        .back-home { position: absolute; top: 24px; left: 24px; color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; z-index: 3; }
        .back-home:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="auth-bg">
        <div class="grid-overlay"></div>
        <div class="glow-spot one"></div>
        <div class="glow-spot two"></div>

        <a href="{{ url_for('home') }}" class="back-home">← Back</a>

        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="sub">Login to your agency dashboard</p>

            {% if error %}
            <div class="alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="modern-input" value="{{ email|default('') }}" placeholder="you@agency.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="modern-input" placeholder="Your password" required>
                </div>
                <button type="submit" class="btn-shimmer" style="width:100%;padding:16px;margin-top:8px;">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
