<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login — {{ agency.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f8fb; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-wrap {
            width: 380px; max-width: 90vw;
        }
        .login-brand {
            text-align: center; margin-bottom: 32px;
        }
        .login-brand h1 {
            font-size: 22px; font-weight: 700; color: #1a1a2e;
        }
        .login-brand p {
            font-size: 14px; color: #999; margin-top: 6px;
        }
        .login-card {
            background: #fff; border-radius: 12px; border: 1px solid #eee;
            padding: 32px;
        }
        .login-card h2 {
            font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 24px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 6px;
        }
        .field input {
            width: 100%; padding: 11px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 15px; outline: none; font-family: inherit; transition: border-color 0.15s;
        }
        .field input:focus { border-color: {{ agency.primary_color }}; }
        .login-btn {
            width: 100%; padding: 12px; background: #1a1a2e; color: #fff; border: none;
            border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
            font-family: inherit; transition: all 0.15s;
        }
        .login-btn:hover { background: #2a2a4e; }
        .error-msg {
            background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
            padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px;
        }
        .login-footer {
            text-align: center; margin-top: 20px; font-size: 13px; color: #bbb;
        }
        .login-footer a { color: #999; text-decoration: none; }
        .login-footer a:hover { color: #666; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <h1>{{ agency.name }}</h1>
            <p>Client Dashboard</p>
        </div>
        <div class="login-card">
            <h2>Sign in</h2>
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="field">
                    <label>Email</label>
                    <input type="email" name="email" value="{{ email|default('') }}" placeholder="your@email.com" required autofocus>
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Your password" required>
                </div>
                <button type="submit" class="login-btn">Sign in</button>
            </form>
        </div>
        <div class="login-footer">
            <a href="/a/{{ agency.slug }}">Start new onboarding</a>
        </div>
    </div>
</body>
</html>
