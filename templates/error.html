<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - {{ agency_name|default('Onboarding') }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #fff; border-radius: 16px; padding: 60px 40px; text-align: center; max-width: 500px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .error-icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 12px; }
        p { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">😕</div>
        <h1>Something went wrong</h1>
        <p>{{ message|default('An unexpected error occurred. Please try again.') }}</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
